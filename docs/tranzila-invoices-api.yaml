                      to_doc_currency_exchange_rate: '1'
                  payments:
                    - payment_method: '5'
                      payment_date: '2021-01-11'
                      amount: '100.25'
                      currency_code: ILS
                      to_doc_currency_exchange_rate: '1'
      responses:
        '200':
          description: |
            Document creation response (success or error)

            ## Success Response
            When an invoice PDF is successfully created:
            - `status_code: 0` = Success
            - `status_msg: "Success"` or `"הצלחה"`
