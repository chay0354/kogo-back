      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                terminal_name:
                  type: string
                  description: Terminal for which a document is created
                document_date:
                  type: string
                  format: date
                  pattern: yyyy-mm-dd
                  example: '2024-01-20'
                document_type:
                  type: string
                document_language:
                  type: string
                  description: '`eng` English, `heb` Hebrew'
                  default: heb
                document_currency_code:
                  type: string
                  description: '[Currency table detail](https://docs.tranzila.com/docs/invoices/erwyy1y8szn0h-params-table#currencies)'
                  default: ILS
                action:
                  type: integer
                  description: '`1` Debit, `3` Credit'
                  default: 1
                vat_percent:
                  type: integer
                  default: Terminal setting or BOI next to document date
                  example: 17
                client_company:
                  type: string
                client_id:
                  type: string
                  description: Numeric
                client_email:
                  type: string
                  description: Client email address
                client_name:
                  type: string
                client_address_line_1:
                  type: string
                client_address_line_2:
                  type: string
                client_zip:
                  type: string
                  description: "Numeric\r\n\r\n"
                client_city:
                  type: string
                client_country_code:
                  type: string
                client_receipt_paid_for:
                  type: string
                response_language:
                  type: string
                  description: '`eng` English, `heb` Hebrew'
                  default: eng
                payments:
                  type: array
                  description: "Array of payment documents, depending on document type. </br>\r\nDifferent payment methods require different fields, [as detailed here.](https://docs.tranzila.com/docs/invoices/erwyy1y8szn0h-params-table#payment-fields-requirement-by-payment-method)"
                  items:
                    type: object
                    properties:
                      payment_method:
                        type: integer
                        description: "`1` Credit Card, `3` Cheque, `4` Bank Transfer, `5` Cash, `6` PayPal, `10` Other\r\n"
                        minimum: 1
                        maximum: 10
                        example: 1
                      payment_date:
                        type: string
                        format: date
                        pattern: yyyy-mm-dd
                        example: '2024-01-01'
                      amount:
                        type: number
                      currency_code:
                        type: string
                        default: ILS
                      to_doc_currency_exchange_rate:
                        type: number
                        description: Mandatory if currency code different from document currency
                      cc_last_4_digits:
                        type: string
                        description: 'When using payment_method `1` '
                        maxLength: 4
                        example: '4568'
                      cc_credit_term:
                        type: integer
                        description: "When using payment_method `1` </br> `1` Regular,\r\n `6` Credit plan (isracredit/visa adif), \r\n `8` Payments"
                        default: 1
                      cc_installments_number:
                        type: integer
                        description: 'When using payment_method `1` '
                        minimum: 2
                      cc_brand:
                        type: integer
                        description: "credit card brand When using payment_method `1` </br>\r\n[Guidelines for parameters](uhttps://docs.tranzila.com/docs/invoices/erwyy1y8szn0h-params-table#credit-card-brandsrl)"
                      bank:
                        type: string
                        description: 'When using payment_method `3` OR `4` '
                      bank_branch:
                        type: string
                        description: 'When using payment_method `3` OR `4` '
                      bank_account:
                        type: string
                        description: 'When using payment_method `3` OR `4` '
                      cheque_number:
                        type: string
                        description: "When using payment_method `3`\r\n "
                      paypal_account:
                        type: string
                        description: When using payment_method `6`
                      paypal_transaction_number:
                        type: string
                        description: When using payment_method `6`
                      other_description:
                        type: string
                        description: 'When using payment_method `10` '
                    required:
                      - payment_method
                      - payment_date
                      - amount
                items:
                  type: array
                  description: 'Array of item documents, depending on document type'
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      unit_price:
                        type: number
                        minimum: 0
                      code:
                        type: string
                      type:
                        type: string
                        default: I
                      price_type:
                        type: string
                        default: G
                      units_number:
                        type: number
                        minimum: 1
                        default: 1
                      unit_type:
                        type: integer
                        description: Guidelines for parameters
                        default: 1
                      currency_code:
                        type: string
                        default: ILS
                      to_doc_currency_exchange_rate:
                        type: integer
                        description: Mandatory if currency code different from document currency
                    required:
                      - name
                      - unit_price
                related_document_number:
                  type: string
                txnindex:
                  type: integer
                  description: This parameter allows you to add a transaction index to the document. It can be used to correlate the document with transactions in the Reports API.
                  example: 12345
                canceldoc:
                  type: string
                  description: 'This parameter indicates whether the document is a credit document for a cancelled transaction. If set to `Y`, the created document''s number will be reflected in the report response under the `txnfdnumber` parameter.'
                  pattern: '^[YN]$'
                  example: '"Y"'
                created_by_system:
                  type: string
                  description: Reference to external system identifying data
                relation_type:
                  type: integer
                  description: "Mandatory if related_document_number is sent or not empty </br> [Guidelines for parameters](https://docs.tranzila.com/docs/invoices/erwyy1y8szn0h-params-table#document-relation-types) \r\n"
                  example: 1
                created_by_user:
                  type: string
                  description: 'Reference to external username, user id or any other identifying data (will not be shown on invoice)'
              required:
                - terminal_name
                - document_date
                - document_type
                - document_language
                - document_currency_code
                - payments
                - items
              x-examples:
                Example 1:
                  terminal_name: terminalname
                  document_date: '2021-01-01'
                  document_type: IR
