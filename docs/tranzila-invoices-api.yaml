components:
  schemas:
    CreateDocumentRequest:
      type: object
      title: Create Document Request
      required:
        - terminal_name
        - items
        - payments
      properties:
        terminal_name:
          type: string
          description: Terminal for which a document is created
          example: myterminal
        document_date:
          type: string
          format: date
          description: 'Document date (default: current date)'
          pattern: yyyy-mm-dd
          example: '2024-01-20'
        document_type:
          type: string
          description: |
            Document type:
            - `IR` = Tax invoice/receipt (חשבונית מס/קבלה)
            - `RE` = Receipt (קבלה)
            - `DI` = Deal Invoice (חשבונית עסקה)
            - `IN` = Tax invoice (חשבונית מס)
          enum:
            - IR
            - RE
            - DI
            - IN
          default: IR
          example: IR
        document_currency_code:
          type: string
          description: 'Document currency (default: ILS)'
          default: ILS
          example: ILS
        vat_percent:
          type: number
          format: decimal
          description: 'VAT percentage (default: Terminal setting or Bank of Israel rate)'
          example: 17
        action:
          type: integer
          description: |
            Document action:
            - `1` = Debit (חיוב)
            - `3` = Credit (זיכוי)
          enum:
            - 1
            - 3
          default: 1
          example: 1
        client_company:
          type: string
          description: Client company name
          example: Test Ltd
        client_name:
          type: string
          description: Client name or contact person
          example: John Doe
        client_id:
          type: string
          description: Client ID number (numeric)
          example: '123456789'
        client_email:
          type: string
          format: email
          description: Client email address
          example: test@test.com
        client_address_line_1:
          type: string
          description: Client address line 1
          example: 123 Main St
        client_address_line_2:
          type: string
          description: Client address line 2
          example: Apt 4B
        client_city:
          type: string
          description: Client city
          example: Jerusalem
        client_country_code:
          type: string
          description: Country code (ISO 3166 two letter code)
          default: IL
          example: IL
        client_zip:
          type: string
          description: Client zip code (numeric)
          example: '4545451'
        items:
          type: array
          description: Array of item documents
          items:
            $ref: '#/components/schemas/Item'
        payments:
          type: array
          description: Array of payment documents
          items:
            $ref: '#/components/schemas/Payment'
        document_language:
          type: string
          description: |
            Document language:
            - `heb` = Hebrew
            - `eng` = English
          enum:
            - heb
            - eng
          default: heb
          example: heb
        response_language:
          type: string
          description: |
            Response language:
            - `eng` = English
            - `heb` = Hebrew
          enum:
            - eng
            - heb
          default: eng
          example: eng
        related_document_number:
          type: integer
          description: Related document number (for credit documents)
          example: 111819
        relation_type:
          type: integer
          description: Relation type (mandatory if related_document_number is provided)
          example: 1
        client_receipt_paid_for:
          type: string
          description: Product or service name (use only when generating receipt only - RE)
          example: Consulting services
        created_by_user:
          type: string
          description: 'Reference to external username, user_id or any other identifying data (will not be shown on invoice)'
          example: user123
        created_by_system:
          type: string
          description: Reference to external system identifying data
          example: MyERP v2.1
      x-stoplight:
        id: 2i7xkrbqy4lom
    Item:
      type: object
      title: Document Item
      required:
        - name
        - unit_price
      properties:
        code:
          type: string
          description: Item code
          example: '321'
        name:
          type: string
          description: Item name
          example: Product A
        type:
          type: string
          description: |
            Item type:
            - `I` = Item (פריט)
            - `S` = Service (שירות)
          enum:
            - I
            - S
          default: I
          example: I
        units_number:
          type: number
          format: decimal
          description: Number of units
          default: 1
          example: 2
        unit_type:
          type: integer
          description: |
            Unit type:
            - `1` = Unit, `2` = Gram, `3` = Kilogram, `4` = Metric Ton
            - `5` = Day, `6` = Week, `7` = Month, `8` = Year
            - `9` = Centimeter, `10` = Meter, `11` = Kilometer
            - `12` = MB, `13` = GB, `14` = TB
          default: 1
          example: 1
        unit_price:
          type: number
          format: decimal
          description: Price per unit
          example: 70.25
        price_type:
          type: string
          description: |
            Price type:
            - `G` = Gross (VAT extracted from amount)
            - `N` = Net (VAT added to amount)
          enum:
            - G
            - 'N'
          default: G
          example: G
        currency_code:
          type: string
          description: Item currency code
          default: ILS
          example: ILS
        to_doc_currency_exchange_rate:
          type: number
          format: decimal
          description: Exchange rate (mandatory if currency code different from document currency)
          example: 1
      x-stoplight:
        id: wkev8sw4x61vf
    Payment:
      type: object
      title: Payment Details
      required:
        - payment_method
        - amount
      properties:
        payment_method:
          type: integer
          description: |
            Payment method:
            - `1` = Credit Card
            - `3` = Cheque
            - `4` = Bank Transfer
            - `5` = Cash
            - `6` = PayPal
            - `10` = Other
          enum:
            - 1
            - 3
            - 4
            - 5
            - 6
            - 10
          example: 1
        payment_date:
          type: string
          format: date
          description: 'Payment date (default: current date)'
          pattern: yyyy-mm-dd
          example: '2024-01-20'
        amount:
          type: number
          format: decimal
          description: Payment amount
          example: 100.25
        currency_code:
          type: string
          description: Payment currency code
          default: ILS
          example: ILS
        to_doc_currency_exchange_rate:
          type: number
          format: decimal
          description: Exchange rate (mandatory if currency code different from document currency)
          example: 1
        cc_last_4_digits:
          type: string
          description: Last 4 digits of credit card (for payment_method 1)
          maxLength: 4
          example: '4568'
        cc_credit_term:
          type: integer
          description: |
            Credit term (for payment_method 1):
            - `1` = Regular
            - `6` = Credit plan (Isracredit/Visa Adif)
            - `8` = Payments
          example: 1
        cc_installments_number:
          type: integer
          description: Number of installments (for payment_method 1)
          example: 3
        cc_brand:
          type: integer
          description: Credit card brand code (for payment_method 1)
          example: 1
        bank:
          type: string
          description: 'Bank code (for payment_method 3, 4)'
          example: '10'
        bank_branch:
          type: string
          description: 'Bank branch code (for payment_method 3, 4)'
          example: '326'
        bank_account:
          type: string
          description: 'Bank account number (for payment_method 3, 4)'
          example: '123456'
        cheque_number:
          type: string
          description: Cheque number (for payment_method 3)
          example: '987654'
        paypal_account:
          type: string
          description: PayPal account (for payment_method 6)
          example: user@paypal.com
        paypal_transaction_number:
          type: string
          description: PayPal transaction number (for payment_method 6)
          example: TXN123456
        other_description:
          type: string
          description: Description for other payment types (for payment_method 10)
          example: Gift card
        txnindex:
          type: integer
          description: Transaction index to link the document with a Tranzila transaction
          example: 12345
        canceldoc:
          type: string
          description: |
            Indicates if the credit document is for a cancelled transaction
            - `Y` = Yes
            - `N` = No
          pattern: '^[YN]$'
          example: 'Y'
      x-stoplight:
        id: w9leuyunomjz8
    CreateDocumentResponse:
      type: object
      title: Create Document Success Response
      properties:
        status_code:
          type: integer
          description: Status code (0 = success)
          example: 0
        status_msg:
          type: string
          description: Status message
          example: Success
        enquiry_key:
          type: string
          description: Enquiry key for the document
          example: a1a8ca97
        document:
          $ref: '#/components/schemas/DocumentDetails'
      x-stoplight:
        id: q34h1r5hxqefj
    DocumentDetails:
      type: object
      title: Document Details
      properties:
        id:
          type: string
          description: Document ID
          example: '6570'
        number:
          type: string
          description: Document number
          example: '1000008'
        assignment_number:
          type: string
          nullable: true
          description: Tax authority assignment number (מספר הקצאה של רשות המיסים)
          example: null
        total_charge_amount:
          type: number
          format: decimal
          description: Total charge amount
          example: 100.25
        currency:
          type: string
          description: Document currency
          example: ILS
        created_at:
          type: string
          format: date-time
          description: Document creation timestamp
          example: '2024-07-06 12:11:29'
        retrieval_key:
          type: string
          description: Unique key for retrieving the document PDF
          example: NWQzNjlkMjk3YmFkM2EzYTk1MjhiMjgyOWJlZWIyY2JkM2E2MmM2ZDY1NmY3YWZjZWI2ZWFmYTYzYjhjZmY1OGYwMWYzZmVmMWUyMGQ4MDVjOWUyYTdlN2JhOTZlZTM3Njg3OWVkYjE0MDM5MzM4MDkyZmY0ODIyOGEyMzJlNzl1SUgzRThSRW95Z05qUHFXU3dpVEpSNkY1T1V5TzA2LzhMZC9ZbXZiUEdQcWc0eU1Ua09DNDJiUG8xaHJSOUpNSllDZlVJdFRLSUlocitWaDhFNVUvZz09
      x-stoplight:
        id: lcjfuz9nnp2rb
    GetDocumentsResponse:
      type: object
      title: Get Documents Response
      properties:
        status_code:
          type: integer
          description: Status code (0 = success)
          example: 0
        status_msg:
          type: string
          description: Status message
          example: Success
        enquiry_key:
          type: string
          description: Enquiry key for this request
          example: 79b8ba07
        documents:
          type: array
          description: Array of documents
          items:
            type: object
            properties:
              id:
                type: string
                description: Document ID
                example: '6252'
              number:
                type: string
                description: Document number
                example: '1001956'
              assignment_number:
                type: string
                nullable: true
                description: Tax authority assignment number (מספר הקצאה של רשות המיסים)
                example: null
              type:
                type: string
                description: 'Document type (IR, RE, DI, IN)'
                example: IR
              action:
                type: string
                description: 'Document action (1 = Debit, 3 = Credit)'
                example: '1'
              total_charge_amount:
                type: number
                format: decimal
                description: Total charge amount
                example: 10
              currency:
                type: string
                description: Document currency
                example: ILS
              created_at:
                type: string
                format: date-time
                description: Document creation timestamp
                example: '2025-07-27 14:14:31'
              retrieval_key:
                type: string
                description: Unique key for retrieving the document PDF
                example: ZDA2ODJkNDZjNjY0NDkwZTEyMTJmODA5NWRkMDkxODAxNDgwOWY2MTdlY2IxMTY5MzcxMmRiMjYzYWExOGRkZjQyY2I5ZWRlODMxNjljNDlkNzk5NjdkMzAzOTMwODdmOTA4NjBhMjk3OGQyYmFkOThmYWU1ODNlNGI1YzNkMjE1STZMLzZYZ1Bwd2VNRXEvY2pTVm95THpsU3pZQ3d0UUpWUUhuSWNjU3FWbUgyKzlPYTh3b0JFc283YVBxakFXN0w2eXBJT1ppYUYwZEtwMHZjV3Qrdz09
      x-stoplight:
        id: 46e3xve9iyp3s
    ErrorResponse:
      type: object
      title: Error Response
      properties:
        status_code:
          type: integer
          description: Error status code
          example: 10000
        status_msg:
          type: string
          description: Error message
          example: Invalid characters in terminal name or terminal name not found in system
        details:
          type: string
          description: Additional error details
          example: Terminal 'invalid_terminal' does not exist
      x-stoplight:
        id: hlf1bcrhkrziu
x-error-codes:
  description: |
    All error codes return under HTTP 200 status.
    Check the `status_code` field in the response to identify errors.

    ## Error Code Reference
  terminal_errors:
    - code: 10000
      message: Invalid characters in terminal name or terminal name not found in system
      description: Terminal name is invalid or does not exist
      resolution: Verify the terminal name is correct
    - code: 10001
      message: Unknown document action
      description: The action parameter value is invalid
      resolution: Use action=1 for Debit or action=3 for Credit
    - code: 10002
      message: Unknown document type
      description: The document_type value is invalid
      resolution: 'Use IR, RE, DI, or IN as document type'
    - code: 10003
      message: Invalid document date format or document date not allowed by regulation
      description: Document date format is incorrect
      resolution: Use yyyy-mm-dd format and ensure date is valid per Israeli tax regulations
    - code: 10004
      message: VAT percent not numeric
      description: VAT percentage value is invalid
      resolution: Provide a numeric value for vat_percent
    - code: 10005
      message: Unsupported document language
      description: The document_language is not supported
      resolution: Use 'heb' for Hebrew or 'eng' for English
    - code: 10006
      message: Unsupported response language
      description: The response_language is not supported
      resolution: Use 'eng' for English or 'heb' for Hebrew
    - code: 10007
      message: Document base number for document type was not found in terminal settings
      description: Terminal is not configured for this document type
      resolution: Contact support to configure document numbering for this terminal
    - code: 10008
      message: Items total ILS amount differs from Payments total ILS amount – unsupported partial document coverage
      description: Item prices don't match payment amounts
      resolution: Ensure total of items equals total of payments
    - code: 10009
      message: Invalid related document number
      description: Related document number does not exist
      resolution: Verify the related_document_number is correct
    - code: 10010
      message: Related document sent but missing relation type
      description: relation_type is required when related_document_number is provided
      resolution: Include relation_type parameter
    - code: 10011
      message: Invalid related document relation type
      description: The relation_type value is invalid
      resolution: Verify relation_type value
  client_errors:
    - code: 10100
      message: Client id number not numeric
      description: Client ID (Israeli ID/Tax ID) contains non-numeric characters
      resolution: Provide numeric value for client_id
    - code: 10101
      message: Country code not ISO 2 letter code
      description: Country code format is invalid
      resolution: 'Use ISO 3166-1 alpha-2 format (e.g., IL, US, GB)'
    - code: 10102
      message: Invalid email format
      description: Email address format is invalid
      resolution: Provide valid email address
  item_errors:
    - code: 10200
      message: Unsupported or unknown item currency code
      description: Item currency code is not supported
      resolution: 'Use valid currency code (ILS, USD, EUR, etc.)'
    - code: 10201
      message: Item name empty or contains illegal characters
      description: Item name is missing or invalid
      resolution: Provide valid item name
    - code: 10202
      message: Unknown item type
      description: Item type value is invalid
      resolution: Use 'I' for Item or 'S' for Service
    - code: 10203
      message: Item units number must be numeric and greater than 0
      description: units_number value is invalid
      resolution: Provide positive numeric value for units_number
    - code: 10204
      message: Unknown item unit type
      description: unit_type value is not recognized
      resolution: Use valid unit type code (1-14)
    - code: 10206
      message: 'Item unit price not sent, or not numeric or empty'
      description: unit_price is missing or invalid
      resolution: Provide numeric value for unit_price
    - code: 10208
      message: Unknown item price type
      description: price_type value is invalid
      resolution: Use 'G' for Gross or 'N' for Net
    - code: 10210
      message: Item currency code not ILS but no exchange rate provided
      description: Exchange rate is required for non-ILS currencies
      resolution: Provide to_doc_currency_exchange_rate when currency is not ILS
  document_errors:
    - code: 10300
      message: FAILED_TO_CREATE_DOCUMENT
      description: Document creation failed
      resolution: 'Check all parameters and try again, or contact support'
    - code: 10301
      message: Terminal settings not found
      description: Terminal configuration is missing
      resolution: Contact support to configure terminal
    - code: 10302
      message: FAILED_TO_CREATE_PDF_FILE
      description: PDF generation failed
      resolution: Try again or contact support
  payment_errors:
    - code: 10400
      message: Unknown payment method
      description: payment_method value is invalid
      resolution: 'Use valid payment method code (1, 3, 4, 5, 6, 10)'
    - code: 10401
      message: Unsupported or unknown payment currency code
      description: Payment currency code is not supported
      resolution: Use valid currency code
    - code: 10402
      message: Items not present although mandatory according to document type
      description: items array is missing
      resolution: Provide items array with at least one item
    - code: 10403
      message: Payments not present although mandatory according to document type
      description: payments array is missing
      resolution: Provide payments array with at least one payment
    - code: 10404
      message: Payment currency code not ILS but no exchange rate provided
      description: Exchange rate is required for non-ILS payment currencies
      resolution: Provide to_doc_currency_exchange_rate
    - code: 10405
      message: 'Payment amount not sent, or not numeric or empty'
      description: Payment amount is missing or invalid
      resolution: Provide numeric value for amount
    - code: 10406
      message: Invalid payment date format or payment date not allowed by regulation
      description: Payment date format is incorrect
      resolution: Use yyyy-mm-dd format
    - code: 10407
      message: Unknown payment CC credit term
      description: cc_credit_term value is invalid
      resolution: 'Use valid credit term code (1, 6, 8)'
    - code: 10408
      message: Unknown payment CC brand
      description: cc_brand value is invalid
      resolution: Use valid credit card brand code
  retrieval_errors:
    - code: 10500
      message: Document financial status not found for document type
      description: Document status is invalid
      resolution: Contact support
    - code: 10501
      message: Document update failed
      description: Failed to update document
      resolution: Try again or contact support
    - code: 10600
      message: Unknown document id
      description: Document ID does not exist
      resolution: Verify the document_id is correct
    - code: 10601
      message: DOCUMENT_ID_NOT_FOUND_IN_TABLE
      description: Document ID not found in database
      resolution: Verify the document_id
    - code: 10602
      message: NO_FILE_FOUND_FOR_DOCUMENT
      description: PDF file not found for this document
      resolution: Contact support
x-reference-tables:
  document_types:
    title: Document Types
    description: Valid document type codes
    values:
      - code: IR
        name: Tax Invoice/Receipt
        hebrew: חשבונית מס/קבלה
        description: Combined tax invoice and receipt
      - code: RE
        name: Receipt
        hebrew: קבלה
        description: Receipt only
      - code: DI
        name: Deal Invoice
        hebrew: חשבונית עסקה
        description: Deal invoice
      - code: IN
        name: Tax Invoice
        hebrew: חשבונית מס
        description: Tax invoice
  document_actions:
    title: Document Actions
    description: Valid action codes
    values:
      - code: 1
        name: Debit
        hebrew: חיוב
        description: Charge/Debit transaction
      - code: 3
        name: Credit
        hebrew: זיכוי
        description: Refund/Credit transaction
  payment_methods:
    title: Payment Methods
    description: Valid payment method codes and required fields
    values:
      - code: 1
        name: Credit Card
        required_fields: 'cc_last_4_digits, cc_credit_term, cc_installments_number, cc_brand'
      - code: 3
        name: Cheque
        required_fields: 'bank, bank_branch, bank_account, cheque_number'
