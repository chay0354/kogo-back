                      units_number: '1'
                      unit_type: '2'
                      currency_code: ILS
                      to_doc_currency_exchange_rate: '1'
                  payments:
                    - payment_method: '5'
                      payment_date: '2021-01-11'
                      amount: '100.25'
                      currency_code: ILS
                      to_doc_currency_exchange_rate: '1'
            examples:
              Tax invoice/receipt - IR:
                value:
                  terminal_name: terminalname
                  document_date: '2021-01-01'
                  document_type: IR
                  action: '1'
                  document_language: heb
                  document_currency_code: ILS
                  vat_percent: '17'
                  client_company: Test Ltd
                  client_id: '123456789'
                  client_name: Test
                  client_email: test@test.com
                  client_address_line_1: test line 1
                  client_address_line_2: test line 2
                  client_zip: '4545451'
                  client_city: City
                  client_country_code: IL
                  items:
                    - type: I
                      code: '321'
                      name: A
                      price_type: G
                      unit_price: '70.25'
                      units_number: '1'
                      unit_type: '1'
                      currency_code: ILS
                      to_doc_currency_exchange_rate: '1'
                    - type: I
                      code: '111'
