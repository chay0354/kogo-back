  /api/documents_db/get_document:
    post:
      summary: Get financial document
      description: |-
        ### This endpoint will generate a PDF upon success and return JSON in case of an error.
        | Element Name | Data type | Mandatory | Note (default value in bold) |
        |-----------|-----|-------------| -----------------------------|
        | terminal_name     | String  | Yes    | Terminal in which a document was created|
        | document_id       | integer  | Yes|                              |
        | response_language   | String  | No |  **eng**        |

        ### JSON Example

        ```json
        {
          "terminal_name": "terminalname",
          “document_id”: “11823”
        }
        ```
      operationId: post-api-documents_db-get_document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - terminal_name
                - document_id
              properties:
                terminal_name:
                  type: string
                  description: Terminal in which the document was created
                  example: terminalname
                document_id:
                  type: string
                  description: Document ID
                  example: '11823'
                response_language:
                  type: string
                  description: 'Response language: ''eng'' for English, ''heb'' for Hebrew'
                  enum:
                    - eng
                    - heb
                  default: eng
                  example: eng
            examples:
              getDocument:
                value:
                  terminal_name: terminalname
                  document_id: '11823'
      responses:
        '200':
          description: |
            **Success: Returns PDF file**

            When successful, this endpoint returns the PDF document file directly.
            The response Content-Type will be `application/pdf`.

            **Error: Returns JSON**

            When an error occurs, returns JSON with error details:
            - `status_code`: Error code (see error codes section)
            - `status_msg`: Error message

            Common errors:
            - `10600`: Unknown document id
            - `10601`: Document ID not found in database
            - `10602`: No PDF file found for document
          content:
            application/pdf:
              schema:
                type: string
                format: binary
                description: PDF document file
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                errorDocumentNotFound:
                  summary: Error 10600 - Document not found
                  value:
                    status_code: 10600
                    status_msg: Unknown document id
                errorNoFile:
                  summary: Error 10602 - PDF not found
                  value:
                    status_code: 10602
                    status_msg: NO_FILE_FOUND_FOR_DOCUMENT
      servers:
        - url: 'https://billing5.tranzila.com'
          description: main API server
      x-stoplight:
        id: 3ow9bdyee984b
  '/api/get_financial_document/{retrieval_key}':
    get:
      summary: Get financial document – for web use only (end client)
      description: |
        Retrieve a financial document PDF using its unique retrieval key.

        This endpoint is designed for displaying documents to end customers via web browser.

        ## Success Response
        Returns the PDF document file directly with `Content-Type: application/pdf`.

        ## Error Response
        Returns an HTML error page when:
        - Retrieval key is invalid
        - Document not found
        - Document expired

        ## Example Usage
        ```
        https://my.tranzila.com/api/get_financial_document/[retrieval_key]
        ```

        **Sample PDF:** [View example document](https://my.tranzila.com/api/get_financial_document/YTM0NWFlZmI4NTk3ODgzYzFlNGJkNWYzMTY5YTFhZjM2ZTM5NWM0OGZlYWU0NzEyM2IyYTRmZmEzYjQyZGRmYmNmZGNkMWRkN2VkMjRhNWZhMTM5MmVhNTBiNmQ4ZGQ5NTUxODIzMDljZTY4N2M3MmUwZTE3ZjFjOTFlODQwYWRpRTl5MVB1dUdxZmFXWDdzWEcxVkZNWmV4SnZndmVocGZmZ1VTcUtTT1NkTjlJZXkvM2xtSmJkakh2bmhWNndpV1locnlmQTVTUHBPdHllVlVNc24wZz09)

        **Error page example:** [Invalid retrieval key](https://my.tranzila.com/errors/page_missing)

        ## Troubleshooting
        - **Check the Retrieval Key**: Ensure the key is copied exactly from the API response
        - **Contact Support**: If the key is correct but document doesn't load
      operationId: get-api-get_financial_document-retrieval_key
      parameters:
        - name: retrieval_key
          in: path
          required: true
          description: Unique document retrieval key (obtained from create_document or get_documents response)
          schema:
            type: string
          example: NWQzNjlkMjk3YmFkM2EzYTk1MjhiMjgyOWJlZWIyY2JkM2E2MmM2ZDY1NmY3YWZjZWI2ZWFmYTYzYjhjZmY1OGYwMWYzZmVmMWUyMGQ4MDVjOWUyYTdlN2JhOTZlZTM3Njg3OWVkYjE0MDM5MzM4MDkyZmY0ODIyOGEyMzJlNzl1SUgzRThSRW95Z05qUHFXU3dpVEpSNkY1T1V5TzA2LzhMZC9ZbXZiUEdQcWc0eU1Ua09DNDJiUG8xaHJSOUpNSllDZlVJdFRLSUlocitWaDhFNVUvZz09
      responses:
        '200':
          description: |
            **Success:** PDF document file

            Returns the financial document as a PDF file that can be displayed in browser or downloaded.
          content:
            application/pdf:
              schema:
                type: string
                format: binary
                description: PDF document file
        '404':
          description: |
            **Error:** Document not found or invalid retrieval key

            Returns HTML error page when:
            - Retrieval key is invalid or expired
            - Document has been deleted
            - Access is restricted
          content:
            text/html:
              schema:
                type: string
                description: HTML error page
      servers:
        - url: 'https://my.tranzila.com'
          description: document web display
      x-stoplight:
        id: hdj5h8w2jhfuj
  /api/documents_db/get_documents:
    post:
      summary: Get financial documents
      description: |-
        This endpoint accepts json and returns json.

        | Element Name | Data type | Mandatory | Note (default value in bold) |
        |-----------|-----|-------------| -----------------------------|
        | terminal_names     | array of strings | Yes    |  Terminals for which documents are created |
        | transaction_ids       | array of integers  |  See note | Mandatory if all other fields empty    |
