components:
  securitySchemes:
    apiAppKey:
      type: apiKey
      in: header
      name: X-tranzila-api-app-key
      description: ''
    apiRequestTime:
      type: apiKey
      in: header
      name: X-tranzila-api-request-time
    apiNonce:
      type: apiKey
      in: header
      name: X-tranzila-api-nonce
    apiAccessToken:
      type: apiKey
      in: header
      name: X-tranzila-api-access-token
  requestBodies:
    stoCreate:
      required: true
      description: contains all information require to create an STO
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/STO'
    stoUpdate:
      required: true
      description: update STO data
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/STOUpdate'
    stosGet:
      required: true
      description: get STOs
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/getSTOs'
    transactionApplepayPaymentCreate:
      required: true
      description: apple pay payment request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/transactionApplepayPaymentCreate'
    transactionApplepayMerchantValidate:
      required: true
      description: apple pay merchant validate request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/transactionApplepayMerchantValidate'
    transactionCreditCardCreate:
      required: true
      description: create a credit card transaction
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/transactionCreditCardCreate'
    masavBody:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Masav'
  schemas:
    terminalName:
      type: string
      example: myterminal
      x-stoplight:
        id: dun4ozkd4hq3g
    email:
      type: string
      example: mail@example.com
      x-stoplight:
        id: pd2lrxc0suhbk
      format: email
      pattern: mail@example.com
    shortDisplayDate:
      type: string
      pattern: '^([0-2][0-9]|(3)[0-1])(\/)(((0)[0-9])|((1)[0-2]))(\/)\d{2}$'
      x-stoplight:
        id: 6efzfwvjrs6ib
      title: ''
    socialIDNumber:
      type: string
      pattern: '^[0-9]{9}$'
      example: '012345632'
      x-stoplight:
        id: tqkkn0gcvkri1
    zipCode:
      type: string
      example: '4030160'
      x-stoplight:
        id: 33mkl2ot9njty
    txnCurrencyCode:
      x-stoplight:
        id: om5bwi1oap55y
      x-examples:
        Example 1:
          txn_currency_code: ILS
        Example 2:
          txn_currency_code: USD
      type: string
      enum:
        - USD
        - EUR
        - ILS
        - JPY
        - DKK
        - CHF
        - NOK
        - SEK
        - AUD
        - CAD
        - GBP
      default: ILS
      description: 'Allowed currency values in tranzila, based on the ISO 4217 three letter standard.'
      title: ''
    priceType:
      type: string
      default: G
      description: |
        if Gross, sent price/amount is processed as is, with VAT extracted from sent price/amount, if Net, VAT is added to sent amount. price type can either be
          * `G` - Gross
          * `N` - Net
      enum:
        - 'N'
        - G
      example: G
      x-stoplight:
        id: c1xx25e180rzm
    Error:
      type: object
      x-stoplight:
        id: crjg7fxsb82zc
      required:
        - message
      properties:
        error_code:
          type: string
        message:
          type: string
        'response ':
          type: string
          x-stoplight:
            id: tow71yy36slvt
          description: "Error Code\r\n"
    tokenDetails:
      type: object
