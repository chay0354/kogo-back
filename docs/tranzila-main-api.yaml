openapi: 3.0.1
x-stoplight:
  id: 8kyc69pa7oiqv
info:
  version: '1.0'
  title: Tranzila API
  description: |-
    Detailed explanation regarding the authentication header parameters can be found in [authentication](docs/Auth.md)

    | Header               |  Note |
    | :------------- | :----------- |
    | **X-tranzila-api-app-key**      | Application key supplied by Tranzila |
    | **X-tranzila-api-request-time**   |   Request time sent in Unix format (large integer counting milliseconds from Jan 1 st , 1970 00:00:00    |
    | **X-tranzila-api-nonce** |   A 40 bytes NONCE – unique random string generated with any random bytes function  |
    | **X-tranzila-api-access-token** |   hash_hmac using ‘sha256’ on application key with secret + request-time + nonce. hash_hmac is available for all programming languages with samples found here: https://www.jokecamp.com/blog/examples-of-creating-base64-hashes-using-hmac-sha256-in-different-languages/    |
  termsOfService: 'https://tranzila.com/api/terms'
  contact:
    name: Tranzila
    url: 'http://www.tranzila.com'
    email: support@tranzila.com
servers:
  - url: 'https://api.tranzila.com/v1'
    description: V1 Server
tags:
  - name: Standing orders
    description: manage STOs
  - name: Tokens
    description: create or retrieve credit card tokens
  - name: Apple pay
    description: manage apple pay merchants and transactions
  - name: Transactions
    description: manage transactions
externalDocs:
  description: Public Tranzila API Documentation
  url: 'https://developer.tranzila.com/docs'
paths:
  /transaction/credit_card/create:
    post:
      operationId: create a credit card transaction
      summary: create a credit card transaction
      requestBody:
        $ref: '#/components/requestBodies/transactionCreditCardCreate'
      responses:
        '200':
          description: |
            The response can be 200 with an Application error code:
            | Error Code |  Description  |
            | :------------- | :----------- |
            | **20111**      | Provided token check failure |
            | **20112**      | Original transaction not found |
            | **21100**      | Transaction index is not equal to original transaction index |
            | **21101**      | Provided index was empty |
            | **22101**      | Empty authorization number |
            | **22100**      | Authorization number is not equal to the transaction value |
            | **22103**      | Invalid DCdisable |
            | **23002**      | Already Credited this transaction id |
            | **23002**      | id 4 - sum is larger than the original debit transaction |
            | **23001**      | Original transaction authorization number is invalid. |
            | **23001**      | id 1 - Attempting to credit a transaction that has already been canceled 
            | **20112**      | An origin transaction index is linked to an uncreditable origin transaction (e.g., rejected or non-existent index) or an attempt to credit a different card than the one originally charged. |
          content:
            application/json:
              schema:
                type: object
                properties:
                  error_code:
                    description: '0 - success, others - failure'
                    type: integer
                    example: 0
                  message:
                    description: 'for error_code 0 - success. for others, failure reason'
                    type: string
                    example: success
                  transaction_result:
                    type: object
                    properties:
                      processor_response_code:
                        description: shva transaction response code
                        type: string
                        example: '000'
                      transaction_id:
                        description: tranzila internal transaction id
                        type: integer
                        example: 12345
                      Responsecvv:
                        type: string
                        x-stoplight:
                          id: 81g3n6agzfr78
                        description: "`0 – Not entered \r\n1 – Entered and valid \r\n2 – Invalid \r\n3 – Not checked\r\n`"
                        example: '"2"'
                      Responseid:
                        type: string
                        x-stoplight:
                          id: o59x9zsav4c74
                        description: "`0 – Not entered \r\n1 – Entered and valid \r\n2 – Invalid \r\n3 – Not checked\r\n`"
                        example: '"1"'
                      auth_number:
                        description: shva authorization id
                        type: string
                        example: '0587923'
                      card_type:
                        description: shva card type
                        type: integer
                        example: 1
                      card_type_name:
                        description: shva card type name
                        example: Mastercard
                      currency_code:
                        description: transaction currency ISO 3 letter code
                        type: string
                        example: USD
                      expiry_month:
                        type: integer
                        example: 12
                      expiry_year:
                        description: card/token expiry date in YY format
                        type: integer
                        example: 22
                      payment_plan:
                        description: according to SHVA pamaeter
                        type: integer
                        example: 1
                      token:
                        description: tranzila internal token (representation) for credit card - applies only to tokens service subscribers
                        type: string
                        example: f1057849hg8495838
                      last_4:
                        description: credit card last 4 digits
                        type: string
                        example: '1234'
                      card_mask:
                        description: 'card bin, masked pan and last 4 digits, used for display purposes'
                        type: string
                        example: 458021xxxxxx4245
                      card_locality:
                        description: 'card locality, whether domestic (israeli) or foreign'
                        type: string
                        example: foreign
                      amount:
                        description: transaction amount in currency
                        type: number
                        example: 10
                      txn_type:
                        type: string
                        x-stoplight:
                          id: pn9rxroykjc9v
                        example: debit
                      tranmode:
                        type: string
                        x-stoplight:
                          id: 4xvhev9hfrv0z
                        pattern: '^[A-Za-z]+$'
                        example: A
                  original_request:
                    x-stoplight:
                      id: banszgs9lly94
                    type: object
                    description: The original JSON sent in the request to the server
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      parameters:
        - schema:
            type: string
          in: header
          name: X-tranzila-api-request-time
          description: 'Request time sent in Unix format (large integer counting milliseconds from Jan 1 st , 1970  00:00:00'
          required: true
        - schema:
            type: string
          in: header
          name: X-tranzila-api-app-key
          description: Application public key supplied by Tranzila
          required: true
        - schema:
            type: string
          in: header
          name: X-tranzila-api-nonce
          description: A 40 bytes NONCE – unique random string generated with any random bytes function
          required: true
        - schema:
            type: string
          in: header
          name: X-tranzila-api-access-token
          description: 'hash_hmac using ‘sha256’ on application key with secret + request-time + nonce. hash_hmac is available for all programming languages with samples found here: https://www.jokecamp.com/blog/examples-of-creating-base64-hashes-using-hmac-sha256-in- different-languages/'
          required: true
      description: |-
        > This endpoint can also be used with an **express terminal**
        ## Transaction Types (txn_type)
        ---
        - debit - deducts funds from a user's account to make a payment or transfer money to another account
        - credit - adds funds to a user's account, typically as a result of a refund or deposit
        - verify -  Pairs with verify_mode attribute - 3DS supported
          - **2** - j2 - Checks Card
          - **5** - j5 - takes credit limit on the amount specified, The charge itself will be in txn_type - force
          - **6** - initialization transaction for standing order (sto), The charge itself will be with txn_type - sto so make sure to keep this transaction txn_type
        - sto - standing order - regular payment of the same amount that’s paid on a specified date need to be verifed first by txn_type - verify, pass the txn_type you recieved via verify transaction in reference_txn_id
        - cancel - canceling a debit or a credit transaction.
        - reversal - release credit limit - j5 Transaction(verify mode 5)

        ## Prevent Duplicate Transctions - Dcdisable

        The prevention solution is based on a unique value sent for a transaction under the parameter DCdisable. Below are the conditions for using the parameter:

        ![dc disable image](assets/images/Transaction-DCdisable.png)

        - You must log into the my.tranzila system and go to the "Additional Fields for Transaction" screen, located under the terminal settings menu, and define only field 20 as the field intended for identifying DCdisable - duplicate charge.

        - If it is detected that the unique value in DCdisable has already been used once, no additional charge will be made.

        - The check in our DB will be performed up to 24 hours back, at the parent terminal level.

        - If a transaction fails the first time, no check will be performed for it on DCdisable. We will display the following message if a duplicate transaction is detected: "This payment has already been made, please contact the business" or "This payment has already been paid. Please contact customer service."

        - The customer must pass the DCdisable parameter with a unique value for that transaction.

        - If you have parent and child terminals, you must define the parameter in both the parent and the child.

        - We recommend providing a long and complex unique value (the limit for the value is 254 characters).

        > visit <a href="#dcdisable-enabled-example">this page</a> for a code example

        ## In what why the transaction was processed? (pan_entry_mode) 
        ---
        - 50 - transaction through phone, the card was not present.
        - 51 - written card.
        - 52 - online transaction 

        ## installments (payment_plan)
        ---
        - 1 - Default, one regular payment
        - 6 - Credit installments - when there is an agreement of the customer with the credit card company you would get the whole sum, but the customer will pay in installments, usually with fees. Minimum 3 payments
        - 8 - regular installments.

        goes with the installments_number, first_installment_amount and other_installments_amount attributes. 

        ## Code Examples
        ---
        ### Required Fields Only
        ```json
        {
          "terminal_name": "myterminal",
          "expire_month": 7,
          "expire_year": 2025,
          "cvv": 111,
          "card_number": 4580458045804580,
          "items": [
            {
              "name": "Pen",
              "type": "I",
              "unit_price": 10.53,
              "units_number": 1,
            }
          ]
        }
        ```
        ### Transaction Types (txn_type)
        ---
        #### Debit (Default)
        ```json
        {
          "terminal_name": "myterminal",
          "txn_type": "debit",
          "expire_month": 7,
          "expire_year": 2025,
          "cvv": 111,
          "card_number": 4580458045804580,
          "items": [
            {
              "name": "Pen",
              "type": "I",
              "unit_price": 10.53,
              "units_number": 1,
            }
          ]
        }
        ```

        #### Credit
        ```json
        {
          "terminal_name": "myterminal",
          "txn_type": "credit",
          "reference_txn_id": 12345,
          "authorization_number":"0587923",
          "expire_month": 7,
          "expire_year": 2025,
          "cvv": 111,
          "card_number": 4580458045804580,
          "items": [
            {
              "name": "Pen",
              "type": "I",
              "unit_price": 10.53,
              "units_number": 1,
            }
          ]
        }
        ```

        #### Verify With verify_mode = 2
        ```json
        {
          "terminal_name": "myterminal",
          "txn_type": "verify",
          "verfiy_mode": 2,
          "expire_month": 7,
          "expire_year": 2025,
          "cvv": 111,
          "card_number": 4580458045804580,
          "items": [
            {
              "name": "Pen",
              "type": "I",
              "unit_price": 10.53,
              "units_number": 1,
            }
          ]
        }
        ```


        #### Verify With verify_mode = 5
        ```json
        {
          "terminal_name": "myterminal",
          "txn_type": "verify",
          "verfiy_mode": 5,
          "expire_month": 7,
          "expire_year": 2025,
          "cvv": 111,
          "card_number": 4580458045804580,
          "items": [
            {
              "name": "Pen",
              "type": "I",
              "unit_price": 10.53,
              "units_number": 1,
            }
          ]
        }
        ```
        #### reversal- release credit limit (j5 verfiy_mode=5)
        ```json
        {
          "terminal_name": "myterminal",
          "txn_type": "reversal",
          "reference_txn_id": 6769,
          "authorization_number": "0000000",
          "expire_month": 7,
          "expire_year": 2025,
          "cvv": 111,
          "card_number": 4580458045804580,
          "items": [
            {
              "name": "Pen",
              "type": "I",
              "unit_price": 10.53,
              "units_number": 1,
            }
          ]
        }
        ```
        #### Charge With verify_mode = 5
        ```json
        {
          "terminal_name": "myterminal",
          "txn_type": "force",
          "reference_txn_id": 6769,
          "expire_month": 7,
          "expire_year": 2025,
          "cvv": 111,
          "card_number": 4580458045804580,
          "items": [
            {
              "name": "Pen",
              "type": "I",
              "unit_price": 10.53,
              "units_number": 1,
            }
          ]
        }
        ```

        #### Verify With verify_mode = 6
        ```json
        {
          "terminal_name": "myterminal",
          "txn_type": "verify",
          "verfiy_mode": 6,
          "expire_month": 7,
          "expire_year": 2025,
          "cvv": 111,
          "card_number": 4580458045804580,
          "items": [
            {
              "name": "Pen",
              "type": "I",
              "unit_price": 10.53,
              "units_number": 1,
            }
          ]
        }
        ```

        #### Charge With verify_mode = 6
        ```json
        {
          "terminal_name": "myterminal",
          "txn_type": "sto",
          "reference_txn_id": 6967,
          "expire_month": 7,
          "expire_year": 2025,
          "cvv": 111,
          "card_number": 4580458045804580,
          "items": [
            {
              "name": "Pen",
              "type": "I",
              "unit_price": 10.53,
              "units_number": 1,
            }
          ]
        }
        ```
        #### cancel transaction example
        ```json
        {
          "terminal_name": "myterminal",
          "txn_type": "cancel",
          "reference_txn_id": 123,
          "authorization_number": "0000000"
        }
        ```
        #### Dcdisable enabled example
        ```json
        {
          "terminal_name": "myterminal",
          "txn_type": "sto",
          "reference_txn_id": 6967,
          "expire_month": 7,
          "expire_year": 2025,
          "cvv": 111,
          "card_number": 4580458045804580,
          "items": [
            {
              "name": "Pen",
              "type": "I",
              "unit_price": 10.53,
              "units_number": 1,
            }
          ],
          "user_defined_fields": [
            {
              "name": "DCdisable",
              "value": "your_generated_unique_value"
            }
          ]
        }
        ```
      x-stoplight:
        id: xsy729b5dsfct
      tags:
        - Transaction
